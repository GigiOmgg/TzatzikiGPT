<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TzatzikiGPT | Πιο Ελληνικό δεν γίνεται!!!</title>
    <link rel="icon" type="image/png" href="tgpt.png">
    <style>
        :root {
            --tz-green: #2d5a27;
            --tz-white: #f9fbf9;
            --tz-blue: #005eb8;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--tz-white); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background: var(--tz-green); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 24px; }
        header p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; position: relative; }
        .user { align-self: flex-end; background: var(--tz-blue); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: white; border: 1px solid #ddd; color: #333; border-bottom-left-radius: 2px; }
        
        #thinking { 
            display: none; 
            align-self: flex-start; 
            background: #e8f0e7; 
            color: var(--tz-green); 
            font-style: italic; 
            font-size: 13px;
            padding: 8px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .bar { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #ccc; outline: none; }
        button { background: var(--tz-green); color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        .error { align-self: center; background: #fee2e2; color: #991b1b; padding: 10px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>🥒 TzatzikiGPT</h1>
    <p>Όπα ρε! Το πιο φρέσκο ΑΙ στο διαδίκτυο.</p>
</header>

<div id="chat-box">
    <div class="msg ai">Γειά σας!</div>
</div>

<div id="thinking">Όπα ρε... Το αγγούρι μαρινάρεται...</div>

<div class="bar">
    <input type="text" id="userInput" placeholder="Ρώτα ρε..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">➤</button>
</div>

<script>
    const API_KEY = "https://api.salting.io/demo/r/19f51ed9-57a1-491e-ad77-aba4af048d7e"; 

    async function send() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const thinking = document.getElementById('thinking');
        const text = input.value.trim();
        
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';

        thinking.style.display = "block";
        chatBox.scrollTop = chatBox.scrollHeight;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            
            thinking.style.display = "none";

            if (data.error) {
                addMsg("Opa! Error: " + data.error.message, 'error');
            } else {
                const aiReply = data.candidates[0].content.parts[0].text;
                addMsg(aiReply, 'ai');
            }
        } catch (e) {
            thinking.style.display = "none";
            addMsg("Connection lost in the Aegean. Try again!", 'error');
        }
    }

    function addMsg(t, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = t;
        document.getElementById('chat-box').appendChild(d);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }
</script>
</body>
</html>
